# This rule is not used by the project kubevirt-migration-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete all migrations.kubevirt.io resources.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.
#
# This role aggregates into the standard "edit" ClusterRole.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubevirt-migration-controller
    app.kubernetes.io/managed-by: kustomize
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  name: migrations-editor-role
rules:
- apiGroups:
  - migrations.kubevirt.io
  resources:
  - virtualmachinestoragemigrationplans
  - virtualmachinestoragemigrations
  - multinamespacevirtualmachinestoragemigrationplans
  - multinamespacevirtualmachinestoragemigrations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - migrations.kubevirt.io
  resources:
  - virtualmachinestoragemigrationplans/status
  - virtualmachinestoragemigrations/status
  - multinamespacevirtualmachinestoragemigrationplans/status
  - multinamespacevirtualmachinestoragemigrations/status
  verbs:
  - get
  - patch
  - update
